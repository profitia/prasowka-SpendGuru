# .github/workflows/daily-food-press.yml
#
# Codziennie o 18:00 czasu polskiego:
#   1. Pobiera nowe artykuły z prasówki food_press
#   2. Przetwarza LLM + klasyfikuje
#   3. Zapisuje do Neon DB
#   4. Generuje data/articles.json (tylko ok + unknown)
#   5. Commituje zmianę, jeśli JSON się zmienił
#
# Wymagane sekrety (Settings → Secrets → Actions):
#   DATABASE_URL                    — Neon Postgres connection string
#   OPENAI_API_KEY                  — klucz OpenAI (dla LLM)
#   APOLLO_API_KEY                  — klucz Apollo.io
#   APOLLO_SEQUENCE_ID              — ID sekwencji Apollo (opcjonalnie)
#   APOLLO_SENDER_EMAIL_ACCOUNT_ID  — ID skrzynki nadawczej Apollo (opcjonalnie)
#
# Uwaga dot. czasu:
#   Cron 16:00 UTC = 18:00 CEST (lato, marzec–październik, UTC+2)
#   Zimą (CET, UTC+1) 18:00 PL = 17:00 UTC → zmień cron na '0 17 * * *'

name: Daily Food Press Scan

on:
  schedule:
    # 18:00 czasu polskiego — czas letni CEST = UTC+2 → 16:00 UTC
    - cron: "0 16 * * *"
  workflow_dispatch:    # możliwość ręcznego uruchomienia

jobs:
  run-pipeline:
    name: Food Press → LLM → Neon DB → articles.json
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # wymagane do git push

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      APOLLO_SEQUENCE_ID: ${{ secrets.APOLLO_SEQUENCE_ID }}
      APOLLO_SENDER_EMAIL_ACCOUNT_ID: ${{ secrets.APOLLO_SENDER_EMAIL_ACCOUNT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-news.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-news.txt

      - name: Apply DB migration (idempotent)
        run: |
          python - <<'EOF'
          import sys; sys.path.insert(0, "src")
          from news.press_db import ensure_press_tables
          ensure_press_tables()
          print("Migration OK")
          EOF

      - name: Run news pipeline
        run: |
          python src/news/orchestrator.py run \
            --brief food_press \
            --save-to-db \
            --export-site-data \
            --skip-email \
            --verbose

      - name: Rebuild articles.json from DB
        run: python scripts/rebuild_articles_json_from_db.py --verbose

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/articles.json

          if git diff --cached --quiet; then
            echo "Brak zmian w articles.json — commit pominięty."
          else
            git commit -m "chore: update daily press articles [$(date -u +%Y-%m-%d)]"
            git push
            echo "articles.json zaktualizowany i wypchnięty."
          fi
