# .github/workflows/daily_prasowka.yml
#
# Codziennie o 6:00 czasu polskiego (lato CEST = UTC+2 → 4:00 UTC):
#   1. Pobiera nowe artykuły z prasówki food_press
#   2. Klasyfikuje artykuły (heurystyki, bez LLM)
#   3. Zapisuje do Postgres/Neon (apollo.press_articles)
#   4. Aktualizuje data/articles.json i commituje zmianę do repo
#
# Wymagane sekrety (Settings → Secrets → Actions):
#   DATABASE_URL  — connection string do Neon, np.:
#                   postgresql://user:pass@ep-xxx.neon.tech/neondb?sslmode=require
#
# Uwaga dot. czasu:
#   Cron 4:00 UTC = 6:00 CEST (lato, marzec–październik)
#                 = 5:00 CET  (zima, październik–marzec)
#   Aby mieć 6:00 przez cały rok, zmień cron na '0 5 * * *' zimą.

name: Daily Prasówka

on:
  schedule:
    - cron: '0 4 * * *'   # 6:00 CEST (UTC+2, lato)
  workflow_dispatch:        # możliwość ręcznego uruchomienia

jobs:
  prasowka:
    name: Prasówka food_press → Neon DB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write        # żeby móc commitować articles.json

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LLM_PROVIDER: none     # wyłącz LLM w CI — działaj na heurystykach

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-news.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-news.txt

      - name: Verify key dependencies
        run: |
          python -m pip show msal
          python -m pip freeze | grep msal

      - name: Apply DB migration (idempotent)
        run: |
          python - <<'EOF'
          import os, psycopg
          sql_path = "../../sql/004_press_articles.sql"
          # Migration SQL is embedded in press_db.ensure_press_tables()
          import sys; sys.path.insert(0, "src")
          from news.press_db import ensure_press_tables
          ensure_press_tables()
          print("Migration OK")
          EOF

      - name: Run prasówka pipeline
        run: |
          python src/news/orchestrator.py run \
            --brief food_press \
            --save-to-db \
            --export-site-data \
            --skip-email \
            --verbose

      - name: Commit updated articles.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          if git diff --cached --quiet; then
            echo "Brak nowych artykułów — articles.json bez zmian."
          else
            COUNT=$(git diff --cached --stat | grep 'articles.json' | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "?")
            git commit -m "chore: auto-update articles.json [$(date -u +%Y-%m-%d)]"
            git push
            echo "Zaktualizowano articles.json (nowych wierszy: ${COUNT})"
          fi
