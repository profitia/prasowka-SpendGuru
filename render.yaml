# render.yaml — konfiguracja deploymentu API na Render.com
#
# Deployment:
#   1. Połącz repo https://github.com/profitia/prasowka-SpendGuru z Render
#   2. Render wykryje ten plik i skonfiguruje usługę automatycznie
#   3. Ustaw sekret DATABASE_URL w Render Dashboard → Environment
#   4. Po deploymencie skopiuj URL usługi (np. https://prasowka-api.onrender.com)
#      i wstaw go do js/config.js jako window.PRASOWKA_API_URL

services:
  - type: web
    name: prasowka-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements-news.txt
    startCommand: uvicorn src.site_api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # ustaw ręcznie w Render Dashboard
      - key: CORS_ORIGINS
        value: "*"           # zmień na konkretny URL GitHub Pages w produkcji
                             # np. https://profitia.github.io
    healthCheckPath: /health
